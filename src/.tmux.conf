# .tmux.confの反映を`prefix r`に
bind-key r source-file ~/.tmux.conf \; display-message "config applied"

# prefixをCtrl-aに
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# `prefix Ctrl-q`でのペイン表示時間を10sに
set-option -g display-panes-time 10000

# マウス操作を有効にする
set-option -g mouse on

# viスタイルでのコピーモード
set-window-option -g mode-keys vi
# viでのコピーモードでvで選択開始、yでコピー
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# | でペインを縦分割する
bind | split-window -h

# - でペインを縦分割する
bind - split-window -v

# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインボーダーの色を設定する
set -g pane-border-style "fg=black,bg=black"
# # アクティブなペインを目立たせる
set -g pane-active-border-style "fg=pink blink"

set-option -g pane-border-status top
set -g default-terminal "screen-256color"

set -g pane-border-lines number

set-hook -g session-created '
  new-window;new-window;

	rename-window -t 0 "[typescript]"
	rename-window -t 1 "[kyopro]"
	rename-window -t 2 "[free]"

  # [typescript]
	split-window -t "[typescript]".0 -h
	send-keys -t "[typescript]".0 "cd ~/repos/my/learning-sandbox/typescript/src && clear && claude" Enter;
	send-keys -t "[typescript]".1 "cd ~/repos/my/learning-sandbox/typescript/src && clear" Enter;

  # [kyopro]
	split-window -t "[kyopro]".0 -h
	send-keys -t "[kyopro]".0 "cd ~/repos/my/learning-sandbox/kyopro && clear && claude" Enter;
	send-keys -t "[kyopro]".1 "cd ~/repos/my/learning-sandbox/kyopro && clear" Enter;
'

# windowを開くときにディレクトリ指定を可能にする
bind c command-prompt -p "directory:" -I "/home/kkgwshm/repos" "new-window -c '%%'"


